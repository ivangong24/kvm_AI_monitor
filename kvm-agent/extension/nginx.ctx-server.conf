location /extras/ai-usage/push/ {
    auth_request off;
    proxy_pass http://kvm_ai_usage/push/;
    include /etc/kvmd/nginx/loc-proxy.conf;
    include /etc/kvmd/nginx/loc-nocache.conf;
}

location /extras/ai-usage/ {
    # The ai-usage console authenticates itself (admin password + optional 2FA, relayed to the
    # Comet login API by the agent, then a signed session cookie), so it is intentionally NOT behind
    # the main KVM web-login gate — this makes it reachable at a direct, bookmarkable URL. Do not
    # re-add loc-login.conf here without also disabling the agent's own auth (KVM_AI_USAGE_AUTH=0).
    auth_request off;
    proxy_pass http://kvm_ai_usage/;
    include /etc/kvmd/nginx/loc-proxy.conf;
    include /etc/kvmd/nginx/loc-nocache.conf;
}
